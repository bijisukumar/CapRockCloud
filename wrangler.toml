name = "caprock-cloud"
compatibility_date = "2024-09-01"
pages_build_output_dir = "dist"

# D1 binding used by /functions Pages Functions (env.CAPROCK_DB)
[[d1_databases]]
binding = "CAPROCK_DB"
database_name = "caprock-db"
database_id = "cb31942e-c90e-4298-a2c2-54b21f884bf4"
migrations_dir = "db/migrations"

# Secrets (set via `wrangler pages secret put`, never committed):
#   TURBO360_API_KEY   - server-side key used by functions/api/tenants/[tenantId]/metrics.js
#   RESEND_API_KEY      - transactional email for the weekly leads digest (future cron trigger)

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "CAPROCK_DB"
database_name = "caprock-db"
database_id = "cb31942e-c90e-4298-a2c2-54b21f884bf4"

[env.preview.vars]
ENVIRONMENT = "preview"

[[env.preview.d1_databases]]
binding = "CAPROCK_DB"
database_name = "caprock-db"
database_id = "cb31942e-c90e-4298-a2c2-54b21f884bf4"
